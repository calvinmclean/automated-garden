{{ define "start" }}
<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden App</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.17.11/dist/css/uikit.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.19.2/dist/js/uikit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.19.2/dist/js/uikit-icons.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.8"></script>
    <script src="https://unpkg.com/htmx.org@1.9.8/dist/ext/json-enc.js"></script>
    <script src="https://unpkg.com/hyperscript.org@0.9.12"></script>
</head>

<style>
    div.htmx-swapping {
        opacity: 0;
        transition: opacity 1s ease-out;
    }
</style>

<body>
    <div id="create-modal-here"></div>
    <div id="settings-modal-here"></div>
    <div id="notification-area" style="position: fixed; top: 70px; left: 50%; transform: translateX(-50%); z-index: 2000; width: 90%; max-width: 800px;"></div>
    <nav class="uk-navbar-container">
        <div class="uk-container">
            <div uk-navbar>
                <div class="uk-navbar-left">
                    <ul class="uk-navbar-nav">
                        <li {{ if URLContains "/gardens" }}class="uk-active" {{ end }}><a href="/gardens">Gardens</a>
                        </li>
                        <li {{ if URLContains "/water_schedules" }}class="uk-active" {{ end }}><a
                                href="/water_schedules?exclude_weather_data=true">Water Schedules</a></li>
                        <li {{ if URLContains "/water_routines" }}class="uk-active" {{ end }}><a
                                href="/water_routines">Water Routines</a></li>
                        <li {{ if URLContains "/weather_clients" }}class="uk-active" {{ end }}><a
                                href="/weather_clients">Weather Clients</a></li>
                        <li>
                        </li>
                    </ul>
                </div>
                <div class="uk-navbar-right">
                    <ul class="uk-navbar-nav">
                        <li>
                            <a hx-get="/settings/components?type=settings_modal" hx-headers='{"Accept": "text/html"}'
                                hx-target="#settings-modal-here"
                                _="on htmx:afterOnLoad wait 10ms then add .uk-open to #modal">
                                <span uk-icon="icon: cog; ratio: 1.0"></span>
                            </a>
                        </li>
                        {{ if IncludePlusButton }}
                        <li>
                            <a hx-get="{{ URLPath }}/components?type=create_modal" hx-headers='{"Accept": "text/html"}'
                                hx-target="#create-modal-here"
                                _="on htmx:afterOnLoad wait 10ms then add .uk-open to #modal">
                                <span uk-icon="icon: plus-circle; ratio: 1.25"></span>
                            </a>
                        </li>
                        {{ end }}
                    </ul>
                </div>
            </div>
        </div>
    </nav>
    {{ end }}

    {{ define "end" }}
    
    <!-- OAuth Popup Handler -->
    <script>
        // Global flag to prevent duplicate handling
        window._netatmoOAuthHandling = false;

        // BroadcastChannel for cross-tab communication (fallback when window.opener is lost)
        const netatmoBroadcastChannel = typeof BroadcastChannel !== 'undefined' ? new BroadcastChannel('netatmo-oauth') : null;

        // Global message handler - listens for ANY OAuth completion
        function handleNetatmoOAuthMessage(e) {
            // Check if this is an OAuth message
            let isSuccess = false;
            let isError = false;
            let errorMsg = '';

            if (e.data === 'netatmo-oauth-success') {
                isSuccess = true;
            } else if (typeof e.data === 'string' && e.data.startsWith('netatmo-oauth-error:')) {
                isError = true;
                errorMsg = e.data.replace('netatmo-oauth-error:', '');
            } else if (e.data && e.data.type === 'netatmo-oauth-success') {
                isSuccess = true;
            } else if (e.data && e.data.type === 'netatmo-oauth-error') {
                isError = true;
                errorMsg = e.data.error || 'Unknown error';
            }

            if (!isSuccess && !isError) return;

            // Prevent duplicate handling
            if (window._netatmoOAuthHandling) return;
            window._netatmoOAuthHandling = true;

            const modal = document.getElementById('modal');
            const wcID = modal?.dataset?.weatherClientId;

            if (isSuccess) {
                UIkit.notification('Successfully connected to Netatmo', { status: 'success' });

                if (wcID && modal) {
                    // Refresh the form
                    setTimeout(function() {
                        htmx.ajax('GET', '/weather_clients/' + wcID + '/components?type=config_form', {
                            headers: { 'Accept': 'text/html' },
                            target: '#config-form-container',
                            swap: 'innerHTML'
                        }).then(function() {
                            // Trigger station loading
                            setTimeout(function() {
                                const stationSelect = document.getElementById('station-select');
                                if (stationSelect && stationSelect.options.length <= 1) {
                                    fetch('/weather_clients/' + wcID + '/netatmo/stations', {
                                        headers: { 'Accept': 'text/html' }
                                    })
                                    .then(response => response.text())
                                    .then(html => { stationSelect.innerHTML = html; })
                                    .catch(err => {
                                        console.error('Failed to load stations:', err);
                                        stationSelect.innerHTML = '<option value="" disabled selected>Error loading stations</option>';
                                    });
                                }
                            }, 100);
                        });
                    }, 500);
                } else {
                    window.location.reload();
                }
            } else if (isError) {
                UIkit.notification('Failed to connect to Netatmo: ' + errorMsg, { status: 'danger' });
                if (modal) {
                    UIkit.modal(modal).hide();
                }
            }

            // Reset flag after a delay
            setTimeout(function() {
                window._netatmoOAuthHandling = false;
            }, 5000);
        }

        // Listen for messages from popup
        window.addEventListener('message', handleNetatmoOAuthMessage);

        // Listen via BroadcastChannel
        if (netatmoBroadcastChannel) {
            netatmoBroadcastChannel.addEventListener('message', handleNetatmoOAuthMessage);
        }

        // Listen for HTMX trigger events to open OAuth popup
        document.body.addEventListener('openOAuthPopup', function(evt) {
            const authURL = evt.detail.value || evt.detail;

            const width = 500;
            const height = 600;
            const left = (window.screen.width - width) / 2;
            const top = (window.screen.height - height) / 2;

            // Open the OAuth popup
            const popup = window.open(
                authURL,
                'netatmo-oauth',
                `width=${width},height=${height},left=${left},top=${top},resizable=yes,scrollbars=yes`
            );

            if (!popup || popup.closed || typeof popup.closed === 'undefined') {
                // Popup was blocked
                UIkit.notification('Please allow popups to authenticate with Netatmo', { status: 'warning' });
            }
        });

        // Scaling Chart Functions
        const ScalingInterpolation = {
            linear: t => t,
            ease_in: t => t * t,
            ease_out: t => 1 - Math.pow(1 - t, 2),
            ease_in_out: t => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2,
            step: t => t < 1 ? 0 : 1
        };

        function generateScalingCurveSVG(inputMin, inputMax, factorMin, factorMax, mode, width, height) {
            // Validate inputs
            if (inputMin === '' || inputMax === '' || factorMin === '' || factorMax === '' || !mode) {
                return null;
            }
            
            const iMin = parseFloat(inputMin);
            const iMax = parseFloat(inputMax);
            const fMin = parseFloat(factorMin);
            const fMax = parseFloat(factorMax);
            
            if (isNaN(iMin) || isNaN(iMax) || isNaN(fMin) || isNaN(fMax)) {
                return null;
            }
            
            const interpolate = ScalingInterpolation[mode] || ScalingInterpolation.linear;
            const padding = { top: 10, right: 10, bottom: 25, left: 35 };
            const chartWidth = width - padding.left - padding.right;
            const chartHeight = height - padding.top - padding.bottom;
            
            // Determine Y range (round to nice numbers)
            const yMin = Math.min(fMin, fMax);
            const yMax = Math.max(fMin, fMax);
            const yPadding = (yMax - yMin) * 0.1 || 0.5;
            const yRangeMin = Math.max(0, yMin - yPadding);
            const yRangeMax = yMax + yPadding;
            
            // Generate points
            const numPoints = 30;
            let pathData = '';
            
            for (let i = 0; i <= numPoints; i++) {
                const t = i / numPoints;
                const inputValue = iMin + t * (iMax - iMin);
                const factorT = interpolate(t);
                const factorValue = fMin + factorT * (fMax - fMin);
                
                const x = padding.left + t * chartWidth;
                const y = padding.top + chartHeight - ((factorValue - yRangeMin) / (yRangeMax - yRangeMin)) * chartHeight;
                
                if (i === 0) {
                    pathData += `M ${x} ${y}`;
                } else {
                    pathData += ` L ${x} ${y}`;
                }
            }
            
            // Format numbers nicely
            const fmt = (n) => {
                if (Math.abs(n) >= 100) return Math.round(n).toString();
                if (Math.abs(n) >= 10) return n.toFixed(1);
                if (Math.abs(n) >= 1) return n.toFixed(2);
                return n.toFixed(3);
            };
            
            // Create SVG
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
            svg.setAttribute('class', 'scaling-chart');
            svg.style.width = '100%';
            svg.style.height = 'auto';
            svg.style.maxWidth = '350px';
            
            // Grid lines (horizontal)
            const numGridLines = 4;
            for (let i = 0; i <= numGridLines; i++) {
                const yVal = yRangeMin + (i / numGridLines) * (yRangeMax - yRangeMin);
                const y = padding.top + chartHeight - (i / numGridLines) * chartHeight;
                
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', padding.left);
                line.setAttribute('y1', y);
                line.setAttribute('x2', padding.left + chartWidth);
                line.setAttribute('y2', y);
                line.setAttribute('stroke', '#e5e5e5');
                line.setAttribute('stroke-width', '1');
                svg.appendChild(line);
                
                // Y-axis label
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', padding.left - 5);
                text.setAttribute('y', y + 3);
                text.setAttribute('text-anchor', 'end');
                text.setAttribute('font-size', '10');
                text.setAttribute('fill', '#999');
                text.textContent = fmt(yVal);
                svg.appendChild(text);
            }
            
            // Grid lines (vertical - just at min/max)
            [0, 1].forEach(t => {
                const x = padding.left + t * chartWidth;
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x);
                line.setAttribute('y1', padding.top);
                line.setAttribute('x2', x);
                line.setAttribute('y2', padding.top + chartHeight);
                line.setAttribute('stroke', '#e5e5e5');
                line.setAttribute('stroke-width', '1');
                svg.appendChild(line);
            });
            
            // X-axis labels
            const xLabels = [fmt(iMin), fmt(iMax)];
            xLabels.forEach((label, i) => {
                const x = padding.left + i * chartWidth;
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', x);
                text.setAttribute('y', height - 5);
                text.setAttribute('text-anchor', i === 0 ? 'start' : 'end');
                text.setAttribute('font-size', '10');
                text.setAttribute('fill', '#999');
                text.textContent = label;
                svg.appendChild(text);
            });
            
            // Curve path
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d', pathData);
            path.setAttribute('fill', 'none');
            path.setAttribute('stroke', '#1e87f0');
            path.setAttribute('stroke-width', '2.5');
            path.setAttribute('stroke-linecap', 'round');
            path.setAttribute('stroke-linejoin', 'round');
            svg.appendChild(path);
            
            // Axis lines
            const xAxis = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            xAxis.setAttribute('x1', padding.left);
            xAxis.setAttribute('y1', padding.top + chartHeight);
            xAxis.setAttribute('x2', padding.left + chartWidth);
            xAxis.setAttribute('y2', padding.top + chartHeight);
            xAxis.setAttribute('stroke', '#ccc');
            xAxis.setAttribute('stroke-width', '1');
            svg.appendChild(xAxis);
            
            const yAxis = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            yAxis.setAttribute('x1', padding.left);
            yAxis.setAttribute('y1', padding.top);
            yAxis.setAttribute('x2', padding.left);
            yAxis.setAttribute('y2', padding.top + chartHeight);
            yAxis.setAttribute('stroke', '#ccc');
            yAxis.setAttribute('stroke-width', '1');
            svg.appendChild(yAxis);
            
            return svg;
        }

        function updateScalingCharts() {
            // Rain chart
            const rainChartContainer = document.getElementById('rain-scaling-chart');
            if (rainChartContainer && !document.getElementById('rain-fields').classList.contains('uk-hidden')) {
                const rainInputs = {
                    inputMin: document.getElementById('rain-input-min')?.value,
                    inputMax: document.getElementById('rain-input-max')?.value,
                    factorMin: document.getElementById('rain-factor-min')?.value,
                    factorMax: document.getElementById('rain-factor-max')?.value,
                    mode: document.getElementById('rain-interpolation')?.value
                };
                
                const rainSVG = generateScalingCurveSVG(
                    rainInputs.inputMin, rainInputs.inputMax,
                    rainInputs.factorMin, rainInputs.factorMax,
                    rainInputs.mode, 300, 150
                );
                
                rainChartContainer.innerHTML = '';
                if (rainSVG) {
                    rainChartContainer.appendChild(rainSVG);
                } else {
                    rainChartContainer.innerHTML = '<div class="uk-text-muted uk-text-center" style="line-height: 150px;">Enter values to see curve</div>';
                }
            }
            
            // Temperature chart
            const tempChartContainer = document.getElementById('temperature-scaling-chart');
            if (tempChartContainer && !document.getElementById('temperature-fields').classList.contains('uk-hidden')) {
                const tempInputs = {
                    inputMin: document.getElementById('temperature-input-min')?.value,
                    inputMax: document.getElementById('temperature-input-max')?.value,
                    factorMin: document.getElementById('temperature-factor-min')?.value,
                    factorMax: document.getElementById('temperature-factor-max')?.value,
                    mode: document.getElementById('temperature-interpolation')?.value
                };
                
                const tempSVG = generateScalingCurveSVG(
                    tempInputs.inputMin, tempInputs.inputMax,
                    tempInputs.factorMin, tempInputs.factorMax,
                    tempInputs.mode, 300, 150
                );
                
                tempChartContainer.innerHTML = '';
                if (tempSVG) {
                    tempChartContainer.appendChild(tempSVG);
                } else {
                    tempChartContainer.innerHTML = '<div class="uk-text-muted uk-text-center" style="line-height: 150px;">Enter values to see curve</div>';
                }
            }
        }

        // Modal close handlers for ESC key and clicking outside
        document.addEventListener('keydown', function(evt) {
            if (evt.key === 'Escape') {
                const modal = document.getElementById('modal');
                if (modal && modal.classList.contains('uk-open')) {
                    modal.classList.remove('uk-open');
                    setTimeout(function() {
                        modal.remove();
                    }, 200);
                }
            }
        });

        document.addEventListener('click', function(evt) {
            const modal = document.getElementById('modal');
            if (modal && modal.classList.contains('uk-open')) {
                // Check if click is on the modal backdrop (outside the dialog)
                const dialog = modal.querySelector('.uk-modal-dialog');
                if (dialog && !dialog.contains(evt.target) && evt.target === modal) {
                    modal.classList.remove('uk-open');
                    setTimeout(function() {
                        modal.remove();
                    }, 200);
                }
            }
        });
    </script>
</body>

</html>
{{ end }}
