{{ define "start" }}
<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden App</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.17.11/dist/css/uikit.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.19.2/dist/js/uikit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.19.2/dist/js/uikit-icons.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.8"></script>
    <script src="https://unpkg.com/htmx.org@1.9.8/dist/ext/json-enc.js"></script>
    <script src="https://unpkg.com/hyperscript.org@0.9.12"></script>
</head>

<style>
    div.htmx-swapping {
        opacity: 0;
        transition: opacity 1s ease-out;
    }
</style>

<body>
    <div id="create-modal-here"></div>
    <div id="settings-modal-here"></div>
    <nav class="uk-navbar-container">
        <div class="uk-container">
            <div uk-navbar>
                <div class="uk-navbar-left">
                    <ul class="uk-navbar-nav">
                        <li {{ if URLContains "/gardens" }}class="uk-active" {{ end }}><a href="/gardens">Gardens</a>
                        </li>
                        <li {{ if URLContains "/water_schedules" }}class="uk-active" {{ end }}><a
                                href="/water_schedules?exclude_weather_data=true">Water Schedules</a></li>
                        <li {{ if URLContains "/water_routines" }}class="uk-active" {{ end }}><a
                                href="/water_routines">Water Routines</a></li>
                        <li {{ if URLContains "/weather_clients" }}class="uk-active" {{ end }}><a
                                href="/weather_clients?units=imperial">Weather Clients</a></li>
                        <li>
                        </li>
                    </ul>
                </div>
                <div class="uk-navbar-right">
                    <ul class="uk-navbar-nav">
                        <li>
                            <a hx-get="/notification_clients/components?type=settings_modal" hx-headers='{"Accept": "text/html"}'
                                hx-target="#settings-modal-here"
                                _="on htmx:afterOnLoad wait 10ms then add .uk-open to #modal">
                                <span uk-icon="icon: cog; ratio: 1.0"></span>
                            </a>
                        </li>
                        {{ if IncludePlusButton }}
                        <li>
                            <a hx-get="{{ URLPath }}/components?type=create_modal" hx-headers='{"Accept": "text/html"}'
                                hx-target="#create-modal-here"
                                _="on htmx:afterOnLoad wait 10ms then add .uk-open to #modal">
                                <span uk-icon="icon: plus-circle; ratio: 1.25"></span>
                            </a>
                        </li>
                        {{ end }}
                    </ul>
                </div>
            </div>
        </div>
    </nav>
    {{ end }}

    {{ define "end" }}
    
    <!-- OAuth Popup Handler -->
    <script>
        // Global flag to prevent duplicate handling
        window._netatmoOAuthHandling = false;

        // BroadcastChannel for cross-tab communication (fallback when window.opener is lost)
        const netatmoBroadcastChannel = typeof BroadcastChannel !== 'undefined' ? new BroadcastChannel('netatmo-oauth') : null;

        // Global message handler - listens for ANY OAuth completion
        function handleNetatmoOAuthMessage(e) {
            // Check if this is an OAuth message
            let isSuccess = false;
            let isError = false;
            let errorMsg = '';

            if (e.data === 'netatmo-oauth-success') {
                isSuccess = true;
            } else if (typeof e.data === 'string' && e.data.startsWith('netatmo-oauth-error:')) {
                isError = true;
                errorMsg = e.data.replace('netatmo-oauth-error:', '');
            } else if (e.data && e.data.type === 'netatmo-oauth-success') {
                isSuccess = true;
            } else if (e.data && e.data.type === 'netatmo-oauth-error') {
                isError = true;
                errorMsg = e.data.error || 'Unknown error';
            }

            if (!isSuccess && !isError) return;

            // Prevent duplicate handling
            if (window._netatmoOAuthHandling) return;
            window._netatmoOAuthHandling = true;

            const modal = document.getElementById('modal');
            const wcID = modal?.dataset?.weatherClientId;

            if (isSuccess) {
                UIkit.notification('Successfully connected to Netatmo', { status: 'success' });

                if (wcID && modal) {
                    // Refresh the form
                    setTimeout(function() {
                        htmx.ajax('GET', '/weather_clients/' + wcID + '/components?type=config_form', {
                            headers: { 'Accept': 'text/html' },
                            target: '#config-form-container',
                            swap: 'innerHTML'
                        }).then(function() {
                            // Trigger station loading
                            setTimeout(function() {
                                const stationSelect = document.getElementById('station-select');
                                if (stationSelect && stationSelect.options.length <= 1) {
                                    fetch('/weather_clients/' + wcID + '/netatmo/stations', {
                                        headers: { 'Accept': 'text/html' }
                                    })
                                    .then(response => response.text())
                                    .then(html => { stationSelect.innerHTML = html; })
                                    .catch(err => {
                                        console.error('Failed to load stations:', err);
                                        stationSelect.innerHTML = '<option value="" disabled selected>Error loading stations</option>';
                                    });
                                }
                            }, 100);
                        });
                    }, 500);
                } else {
                    window.location.reload();
                }
            } else if (isError) {
                UIkit.notification('Failed to connect to Netatmo: ' + errorMsg, { status: 'danger' });
                if (modal) {
                    UIkit.modal(modal).hide();
                }
            }

            // Reset flag after a delay
            setTimeout(function() {
                window._netatmoOAuthHandling = false;
            }, 5000);
        }

        // Listen for messages from popup
        window.addEventListener('message', handleNetatmoOAuthMessage);

        // Listen via BroadcastChannel
        if (netatmoBroadcastChannel) {
            netatmoBroadcastChannel.addEventListener('message', handleNetatmoOAuthMessage);
        }

        // Listen for HTMX trigger events to open OAuth popup
        document.body.addEventListener('openOAuthPopup', function(evt) {
            const authURL = evt.detail.value || evt.detail;

            const width = 500;
            const height = 600;
            const left = (window.screen.width - width) / 2;
            const top = (window.screen.height - height) / 2;

            // Open the OAuth popup
            const popup = window.open(
                authURL,
                'netatmo-oauth',
                `width=${width},height=${height},left=${left},top=${top},resizable=yes,scrollbars=yes`
            );

            if (!popup || popup.closed || typeof popup.closed === 'undefined') {
                // Popup was blocked
                UIkit.notification('Please allow popups to authenticate with Netatmo', { status: 'warning' });
            }
        });
    </script>
</body>

</html>
{{ end }}
